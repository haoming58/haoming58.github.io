---
layout: default
---

<div class="note-page-wrapper">
  <div class="note-container">
    <button class="mobile-toc-toggle hidden" onclick="toggleSidebar()">Menu</button>
    
    <div class="note-sidebar" id="sidebar">
      <div class="note-toc">
        <h3>Table of Contents</h3>
        <div id="toc-content">
          <!-- TOC will be generated by JavaScript -->
        </div>
      </div>
    </div>
    
    <div class="note-content">
      {% if page.category or page.subcategory %}
        <nav class="note-breadcrumb" aria-label="breadcrumb">
          <a href="{{ '/notes/' | relative_url }}">笔记</a>
          {% if page.category %}
            <span class="crumb-sep">/</span>
            <a href="{{ '/notes/' | relative_url }}" onclick="sessionStorage.setItem('currentCategory','{{ page.category | slugify }}')">{{ page.category }}</a>
          {% endif %}
          {% if page.subcategory %}
            <span class="crumb-sep">/</span>
            <span class="crumb-current">{{ page.subcategory }}</span>
          {% endif %}
        </nav>
      {% endif %}
      <article class="note-article">
        {{ content }}
      </article>
    </div>
  </div>
</div>

<style>
/* Override default container constraints for note pages */
.note-page-wrapper {
  width: 100%;
  max-width: none;
  margin: 0;
  padding: 0;
}

/* Break out of parent container */
.post > .note-page-wrapper,
.container > .note-page-wrapper {
  width: 100vw;
  position: relative;
  left: 50%;
  right: 50%;
  margin-left: -50vw;
  margin-right: -50vw;
}

.note-container {
  display: flex;
  width: 100%;
  min-height: 100vh;
  margin: 0;
  padding: 0;
  gap: 0;
  position: relative;
}

.note-sidebar {
  flex: 0 0 280px;
  position: fixed;
  top: 0;
  left: 0;
  width: 280px;
  height: 100vh;
  overflow-y: auto;
  background: var(--global-bg-color);
  border-right: 2px solid var(--global-divider-color);
  z-index: 100;
  padding-top: 80px;
  scrollbar-width: thin;
  scrollbar-color: var(--global-theme-color) transparent;
  box-shadow: 2px 0 12px var(--global-divider-color);
}

.note-sidebar::-webkit-scrollbar {
  width: 6px;
}

.note-sidebar::-webkit-scrollbar-track {
  background: transparent;
}

.note-sidebar::-webkit-scrollbar-thumb {
  background: var(--global-theme-color);
  border-radius: 3px;
}

.note-toc {
  background: var(--global-bg-color);
  border: none;
  border-radius: 0;
  padding: 1.5rem;
  box-shadow: none;
  height: 100%;
}

.note-toc h3 {
  margin: 0 0 1rem 0;
  color: var(--global-text-color-light);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--global-divider-color);
}

.note-toc ul {
  list-style: none;
  padding: 0;
  margin: 0;
}

.note-toc li {
  margin: 0.5rem 0;
}

.note-toc a {
  display: block;
  padding: 0.4rem 0.75rem;
  color: var(--global-text-color-light);
  text-decoration: none;
  border-radius: 4px;
  transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  font-size: 0.88rem;
  line-height: 1.5;
  position: relative;
  border-left: 2px solid transparent;
}

.note-toc a:hover {
  color: var(--global-text-color);
  background: var(--global-divider-color);
  text-decoration: none;
}

.note-toc a.active {
  color: var(--global-theme-color);
  font-weight: 600;
  border-left-color: var(--global-theme-color);
  background: transparent;
}

.note-toc .toc-level-1 {
  padding-left: 0.75rem;
  font-size: 0.92rem;
  color: var(--global-text-color);
  font-weight: 500;
}

.note-toc .toc-level-2 {
  padding-left: 1.5rem;
  font-size: 0.85rem;
}

.note-toc .toc-level-3 {
  padding-left: 2.25rem;
  font-size: 0.82rem;
}

.note-toc .toc-level-4,
.note-toc .toc-level-5,
.note-toc .toc-level-6 {
  padding-left: 3rem;
  font-size: 0.8rem;
  opacity: 0.85;
}

/* Back link styles */
.note-toc .back-link {
  color: var(--global-text-color-light) !important;
  font-weight: 500 !important;
  margin-bottom: 0.75rem;
  border-left: 2px solid transparent;
}

.note-toc .back-link:hover {
  color: var(--global-theme-color) !important;
  background: var(--global-divider-color);
}

.note-content {
  flex: 1;
  margin-left: 280px;
  width: calc(100% - 280px);
  min-height: 100vh;
  padding-top: 80px;
  padding-left: 2.5rem;
  padding-right: 2.5rem;
  padding-bottom: 4rem;
  box-sizing: border-box;
  overflow-x: hidden;
}

/* Breadcrumb */
.note-breadcrumb {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto 0.5rem auto;
  padding: 0 2rem;
  font-size: 0.85rem;
  color: var(--global-text-color-light);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.note-breadcrumb a {
  color: var(--global-text-color-light);
  text-decoration: none;
  transition: color 0.15s ease;
}

.note-breadcrumb a:hover {
  color: var(--global-theme-color);
}

.note-breadcrumb .crumb-sep {
  color: var(--global-text-color-light);
  opacity: 0.5;
}

.note-breadcrumb .crumb-current {
  color: var(--global-text-color);
  font-weight: 500;
}

.note-article {
  background: var(--global-bg-color);
  border-radius: 0;
  padding: 1.5rem 2rem 2rem 2rem;
  box-shadow: none;
  max-width: 1200px !important;
  width: 100% !important;
  margin: 0 auto !important;
  box-sizing: border-box;
  font-size: 17px;
  line-height: 1.85;
  letter-spacing: 0.02em;
  /* Chinese-friendly font stack: system → web fallback */
  font-family:
    -apple-system, BlinkMacSystemFont,
    "PingFang SC", "Microsoft YaHei", "HarmonyOS Sans SC",
    "Noto Sans SC", "Source Han Sans CN", "Hiragino Sans GB",
    "Segoe UI", "Roboto", "Helvetica Neue", Arial,
    sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Reading typography */
.note-article p {
  margin: 1em 0;
}

.note-article ul,
.note-article ol {
  margin: 1em 0;
  padding-left: 1.5em;
}

.note-article li {
  margin: 0.4em 0;
}

.note-article li > p {
  margin: 0.4em 0;
}

.note-article strong {
  color: var(--global-text-color);
  font-weight: 600;
}

.note-article blockquote {
  margin: 1.25em 0;
  padding: 0.85em 1.25em;
  border-left: 3px solid var(--global-theme-color);
  background: var(--global-card-bg-color, var(--global-code-bg-color));
  color: var(--global-text-color-light);
  border-radius: 0 6px 6px 0;
}

.note-article blockquote p {
  margin: 0.4em 0;
}

.note-article hr {
  margin: 2.5em 0;
  border: none;
  border-top: 1px solid var(--global-divider-color);
}

/* Inline code */
.note-article code {
  font-size: 0.88em;
  padding: 0.15em 0.4em;
  border-radius: 4px;
  font-feature-settings: "calt" 0; /* disable ligatures for inline code */
}

/* Block code (fenced) */
.note-article pre {
  margin: 1.25em 0;
  padding: 1em 1.25em;
  border-radius: 8px;
  border: 1px solid var(--global-divider-color);
  font-feature-settings: "calt" 1; /* enable ligatures in code blocks */
  font-variant-ligatures: contextual;
  line-height: 1.65;
  font-size: 0.9em;
  tab-size: 4;
  -moz-tab-size: 4;
}

.note-article pre code {
  border: none;
  background: transparent;
  padding: 0;
  font-size: 1em;
}

/* Tables */
.note-article table {
  display: table;
  border-collapse: collapse;
  margin: 1.5em 0;
  font-size: 0.9em;
}

.note-article table th,
.note-article table td {
  padding: 0.6em 1em;
  border: 1px solid var(--global-divider-color);
  text-align: left;
}

.note-article table thead th {
  background: var(--global-card-bg-color, var(--global-code-bg-color));
  font-weight: 600;
}

.note-article table tbody tr:nth-child(even) {
  background: var(--global-card-bg-color, transparent);
}

/* Text content should have comfortable reading width */
.note-article p,
.note-article ul,
.note-article ol,
.note-article blockquote {
  max-width: 100%;
}

/* Math formulas and code blocks can be wider */
.note-article .MathJax_Display,
.note-article .mathjax,
.note-article pre,
.note-article .highlight {
  max-width: 100%;
  overflow-x: auto;
}

.note-article code {
  word-wrap: break-word;
}

.note-article pre code {
  word-wrap: normal;
}

/* Images should be responsive */
.note-article img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 1rem auto;
}

/* Tables: keep table layout. For long tables, container is allowed to scroll horizontally. */
.note-article table {
  border-collapse: collapse;
  width: auto;
  max-width: 100%;
}

.note-article h1,
.note-article h2,
.note-article h3,
.note-article h4,
.note-article h5,
.note-article h6 {
  /* Offset for fixed site navbar (~70px) when jumped to via TOC anchor */
  scroll-margin-top: 5rem;
  font-weight: 600;
  line-height: 1.4;
}

.note-article h1 {
  font-size: 2.2em;
  margin-top: 1.5em;
  margin-bottom: 0.8em;
  color: var(--global-theme-color);
  position: relative;
  padding-bottom: 0.5em;
}

.note-article h1::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 60px;
  height: 3px;
  background: linear-gradient(90deg, var(--global-theme-color) 0%, transparent 100%);
  border-radius: 2px;
}

.note-article h2 {
  font-size: 1.8em;
  margin-top: 1.3em;
  margin-bottom: 0.7em;
  color: var(--global-theme-color);
  position: relative;
  padding-left: 0.75em;
}

.note-article h2::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0.2em;
  width: 4px;
  height: 1em;
  background: var(--global-theme-color);
  border-radius: 2px;
}

.note-article h3 {
  font-size: 1.4em;
  margin-top: 1.2em;
  margin-bottom: 0.6em;
  color: var(--global-text-color);
}


/* Mobile responsiveness */
@media (max-width: 768px) {
  .note-sidebar {
    position: fixed;
    top: 0;
    left: -300px;
    width: 280px;
    height: 100vh;
    transition: left 0.3s ease;
    z-index: 1000;
    padding-top: 70px;
    box-shadow: 2px 0 10px var(--global-divider-color);
  }
  
  .note-sidebar.open {
    left: 0;
  }
  
  .note-content {
    margin-left: 0;
    width: 100%;
    padding-top: 70px;
    padding-left: 1rem;
    padding-right: 1rem;
    padding-bottom: 2rem;
  }
  
  .note-article {
    padding: 1rem;
    max-width: 100% !important;
  }
  
  /* Add toggle button for mobile */
  .mobile-toc-toggle {
    position: fixed;
    top: 70px;
    left: 0.5rem;
    z-index: 1001;
    background: var(--global-theme-color);
    color: white;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    cursor: pointer;
    display: block;
    font-size: 0.9rem;
    box-shadow: 0 2px 8px var(--global-divider-color);
  }
  
  .mobile-toc-toggle.hidden {
    display: none;
  }
  
  /* Close sidebar when clicking outside */
  .note-sidebar.open ~ .note-content::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
  }
}

/* Smooth scrolling and prevent horizontal overflow */
html {
  scroll-behavior: smooth;
  overflow-x: hidden;
}

body {
  overflow-x: hidden;
}

/* Ensure the note container isn't constrained by parent */
.note-container,
.note-container * {
  box-sizing: border-box;
}

/* Hide mobile toggle on desktop */
@media (min-width: 769px) {
  .mobile-toc-toggle {
    display: none !important;
  }
}

/* Mobile responsive */
@media (max-width: 768px) {
  .note-breadcrumb {
    padding: 0 1rem;
    font-size: 0.8rem;
  }

  .note-article {
    font-size: 16px;
    line-height: 1.8;
    padding: 1rem 0.5rem;
  }

  .note-article pre {
    padding: 0.85em 1em;
    font-size: 0.85em;
  }
}
</style>

<script>
// Mobile sidebar toggle function
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('open');
}

// Close sidebar when clicking outside
function closeSidebar(event) {
  const sidebar = document.getElementById('sidebar');
  const toggle = document.querySelector('.mobile-toc-toggle');
  
  if (sidebar.classList.contains('open') && 
      !sidebar.contains(event.target) && 
      !toggle.contains(event.target)) {
    sidebar.classList.remove('open');
  }
}

// Show/hide mobile toggle button based on screen size
function updateMobileToggle() {
  const toggle = document.querySelector('.mobile-toc-toggle');
  if (toggle) {
    if (window.innerWidth <= 768) {
      toggle.classList.remove('hidden');
    } else {
      toggle.classList.add('hidden');
    }
  }
}

// Update on resize
window.addEventListener('resize', updateMobileToggle);

// Close sidebar when clicking outside (mobile only)
document.addEventListener('click', function(event) {
  if (window.innerWidth <= 768) {
    closeSidebar(event);
  }
});

// Function to return to the correct category page
function returnToCategory() {
  // Store the current category in sessionStorage when navigating to a note
  const currentCategory = sessionStorage.getItem('currentCategory');
  if (currentCategory) {
    // Navigate to notes page and show the specific category
    window.location.href = '/notes/';
    // The notes page will automatically show the category if it's in sessionStorage
  } else {
    // Fallback to notes index
    window.location.href = '/notes/';
  }
}

document.addEventListener('DOMContentLoaded', function() {
  // Initialize mobile toggle visibility
  updateMobileToggle();
  
  // Check if this is a notes page (not the main notes index)
  const isNotesPage = window.location.pathname.includes('/notes/') && window.location.pathname !== '/notes/';
  
  // Get the category from the current note page
  let noteCategory = null;
  if (isNotesPage) {
    // Try to get category from the page content
    const categoryElement = document.querySelector('meta[name="category"]');
    if (categoryElement) {
      noteCategory = categoryElement.getAttribute('content');
    } else {
      // Try to get category from the page title or content
      const pageTitle = document.querySelector('h1, .note-article h1');
      if (pageTitle) {
        // This is a workaround - we'll use a generic return to notes
        noteCategory = 'unknown';
      }
    }
  }
  
  // Generate TOC from headings for note content
  const headings = document.querySelectorAll('.note-article h1, .note-article h2, .note-article h3, .note-article h4, .note-article h5, .note-article h6');
  const tocContent = document.getElementById('toc-content');
  
  if (headings.length === 0) {
    if (!isNotesPage) {
      tocContent.innerHTML = '<p style="color: var(--global-text-color-light); font-size: 0.9rem;">No headings found</p>';
    } else {
      // For individual note pages without headings, just show back button
      let tocHTML = '<ul>';
      // Return to notes index page (category view)
      tocHTML += '<li><a href="/notes/" class="toc-level-1 back-link" onclick="returnToCategory()">← 返回上一级</a></li>';
      tocHTML += '</ul>';
      tocContent.innerHTML = tocHTML;
    }
    return;
  }
  
  let tocHTML = '<ul>';
  
  // Add back button for individual notes
  if (isNotesPage) {
    // Return to notes index page (category view)
    tocHTML += '<li><a href="/notes/" class="toc-level-1 back-link" onclick="returnToCategory()">← 返回上一级</a></li>';
  }
  
  let currentLevel = 0;
  
  headings.forEach((heading, index) => {
    const level = parseInt(heading.tagName.charAt(1));
    const id = heading.id || `heading-${index}`;
    
    // Add id if not present
    if (!heading.id) {
      heading.id = id;
    }
    
    // Close previous levels if current level is higher
    if (level > currentLevel) {
      for (let i = currentLevel; i < level; i++) {
        tocHTML += '<ul>';
      }
    } else if (level < currentLevel) {
      for (let i = currentLevel; i > level; i--) {
        tocHTML += '</ul></li>';
      }
    } else if (index > 0) {
      tocHTML += '</li>';
    }
    
    // Add current heading
    tocHTML += `<li><a href="#${id}" class="toc-level-${level}">${heading.textContent}</a>`;
    currentLevel = level;
  });
  
  // Close remaining levels
  for (let i = currentLevel; i > 0; i--) {
    tocHTML += '</li></ul>';
  }
  
  if (!isNotesPage) {
    tocContent.innerHTML = tocHTML;
  } else {
    // For individual notes, append headings to existing TOC
    const existingTOC = tocContent.innerHTML;
    tocContent.innerHTML = existingTOC + tocHTML;
  }
  
  // Add click handlers for smooth scrolling
  const tocLinks = tocContent.querySelectorAll('a[href^="#"]');
  tocLinks.forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const targetId = this.getAttribute('href').substring(1);
      const targetElement = document.getElementById(targetId);
      
      if (targetElement) {
        targetElement.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
        
        // Update active link
        tocLinks.forEach(l => l.classList.remove('active'));
        this.classList.add('active');
      }
    });
  });
  
  // Highlight current section on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        const activeLink = tocContent.querySelector(`a[href="#${id}"]`);
        if (activeLink) {
          tocLinks.forEach(l => l.classList.remove('active'));
          activeLink.classList.add('active');
        }
      }
    });
  }, {
    rootMargin: '-20% 0px -70% 0px'
  });
  
  headings.forEach(heading => {
    observer.observe(heading);
  });
});
</script>
